<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a3e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="barGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="20" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="150" cy="120" r="180" fill="#7c3aed" opacity="0.04" filter="url(#softglow)"/>
  <circle cx="1450" cy="780" r="200" fill="#a855f7" opacity="0.03" filter="url(#softglow)"/>
  <rect x="0" y="0" width="1600" height="4" fill="url(#accent)"/>

  <!-- ===== HEADER ===== -->
  <text x="800" y="90" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="#ffffff" letter-spacing="-2">token-savior</text>
  <rect x="670" y="108" width="260" height="40" rx="20" fill="url(#accent)" opacity="0.9"/>
  <text x="800" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#ffffff" letter-spacing="2">v1.0.0 RELEASED</text>
  <text x="800" y="185" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#9090a8">MCP server for token-efficient AI coding. Scalpel, not sledgehammer.</text>

  <!-- ===== TERMINAL — token savings bars ===== -->
  <rect x="120" y="220" width="1360" height="370" rx="10" fill="#12122a" stroke="#2a2a50" stroke-width="1.5"/>
  <rect x="120" y="220" width="1360" height="34" rx="10" fill="#1a1a38"/>
  <rect x="120" y="244" width="1360" height="10" fill="#1a1a38"/>
  <circle cx="146" cy="237" r="6" fill="#ff5f57"/>
  <circle cx="168" cy="237" r="6" fill="#febc2e"/>
  <circle cx="190" cy="237" r="6" fill="#28c840"/>
  <text x="800" y="243" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#6b6b80">get_usage_stats() -- live production data -- 6 real projects, April 2026</text>

  <!-- Badge -->
  <rect x="1230" y="268" width="220" height="26" rx="4" fill="#1e3a2e" stroke="#34d399" stroke-width="1"/>
  <text x="1340" y="286" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#34d399" font-weight="600">LIVE DATA -- NOT SYNTHETIC</text>

  <!-- Bar chart: horizontal bars showing savings per project -->
  <!-- Each row: label | bar (proportional) | percentage -->

  <!-- Project A — 97% -->
  <text x="165" y="313" font-family="ui-monospace, monospace" font-size="16" fill="#8b8ba0">Project A</text>
  <text x="310" y="313" font-family="ui-monospace, monospace" font-size="13" fill="#4a4a65">51 sessions, 2,223 queries</text>
  <rect x="580" y="297" width="582" height="22" rx="4" fill="#1e1e3a" stroke="#2a2a50" stroke-width="1"/>
  <rect x="580" y="297" width="565" height="22" rx="4" fill="url(#barGreen)" opacity="0.85"/>
  <text x="1180" y="314" font-family="system-ui, sans-serif" font-size="18" fill="#34d399" font-weight="700">97%</text>

  <!-- Project B — 97% -->
  <text x="165" y="353" font-family="ui-monospace, monospace" font-size="16" fill="#8b8ba0">Project B</text>
  <text x="310" y="353" font-family="ui-monospace, monospace" font-size="13" fill="#4a4a65">44 sessions, 1,897 queries</text>
  <rect x="580" y="337" width="582" height="22" rx="4" fill="#1e1e3a" stroke="#2a2a50" stroke-width="1"/>
  <rect x="580" y="337" width="565" height="22" rx="4" fill="url(#barGreen)" opacity="0.85"/>
  <text x="1180" y="354" font-family="system-ui, sans-serif" font-size="18" fill="#34d399" font-weight="700">97%</text>

  <!-- Project C — 98% -->
  <text x="165" y="393" font-family="ui-monospace, monospace" font-size="16" fill="#8b8ba0">Project C</text>
  <text x="310" y="393" font-family="ui-monospace, monospace" font-size="13" fill="#4a4a65">1 session, 38 queries</text>
  <rect x="580" y="377" width="582" height="22" rx="4" fill="#1e1e3a" stroke="#2a2a50" stroke-width="1"/>
  <rect x="580" y="377" width="571" height="22" rx="4" fill="url(#barGreen)" opacity="0.85"/>
  <text x="1180" y="394" font-family="system-ui, sans-serif" font-size="18" fill="#34d399" font-weight="700">98%</text>

  <!-- Project D — 91% -->
  <text x="165" y="433" font-family="ui-monospace, monospace" font-size="16" fill="#8b8ba0">Project D</text>
  <text x="310" y="433" font-family="ui-monospace, monospace" font-size="13" fill="#4a4a65">14 sessions, 808 queries</text>
  <rect x="580" y="417" width="582" height="22" rx="4" fill="#1e1e3a" stroke="#2a2a50" stroke-width="1"/>
  <rect x="580" y="417" width="530" height="22" rx="4" fill="url(#barGreen)" opacity="0.7"/>
  <text x="1180" y="434" font-family="system-ui, sans-serif" font-size="18" fill="#34d399" font-weight="700">91%</text>

  <!-- Project E — 97% -->
  <text x="165" y="473" font-family="ui-monospace, monospace" font-size="16" fill="#8b8ba0">Project E</text>
  <text x="310" y="473" font-family="ui-monospace, monospace" font-size="13" fill="#4a4a65">3 sessions, 22 queries</text>
  <rect x="580" y="457" width="582" height="22" rx="4" fill="#1e1e3a" stroke="#2a2a50" stroke-width="1"/>
  <rect x="580" y="457" width="565" height="22" rx="4" fill="url(#barGreen)" opacity="0.85"/>
  <text x="1180" y="474" font-family="system-ui, sans-serif" font-size="18" fill="#34d399" font-weight="700">97%</text>

  <!-- Project F — 88% -->
  <text x="165" y="513" font-family="ui-monospace, monospace" font-size="16" fill="#8b8ba0">Project F</text>
  <text x="310" y="513" font-family="ui-monospace, monospace" font-size="13" fill="#4a4a65">24 sessions, 86 queries</text>
  <rect x="580" y="497" width="582" height="22" rx="4" fill="#1e1e3a" stroke="#2a2a50" stroke-width="1"/>
  <rect x="580" y="497" width="512" height="22" rx="4" fill="url(#barGreen)" opacity="0.6"/>
  <text x="1180" y="514" font-family="system-ui, sans-serif" font-size="18" fill="#34d399" font-weight="700">88%</text>

  <!-- Total bar -->
  <rect x="155" y="534" width="1070" height="1" fill="#3a3a55"/>
  <text x="165" y="560" font-family="ui-monospace, monospace" font-size="17" fill="#ffffff" font-weight="700">TOTAL</text>
  <text x="310" y="560" font-family="ui-monospace, monospace" font-size="14" fill="#8b8ba0">137 sessions, 5,074 queries</text>
  <rect x="580" y="544" width="582" height="24" rx="4" fill="#1e1e3a" stroke="#2a2a50" stroke-width="1"/>
  <rect x="580" y="544" width="565" height="24" rx="4" fill="url(#gold)" opacity="0.9"/>
  <text x="1180" y="563" font-family="system-ui, sans-serif" font-size="20" fill="url(#gold)" font-weight="800" filter="url(#glow)">97%</text>

  <!-- Explanation -->
  <text x="800" y="596" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#5a5a75">Token savings = 1 - (tokens used via token-savior / tokens that cat/grep would have consumed). Measured per query, aggregated per project.</text>

  <!-- ===== BOTTOM: key facts ===== -->
  <g transform="translate(0, 625)">
    <rect x="120" y="0" width="256" height="80" rx="8" fill="#16163a" stroke="#2a2a50" stroke-width="1"/>
    <text x="248" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="36" font-weight="800" fill="#a855f7" filter="url(#glow)">53</text>
    <text x="248" y="64" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#8b8ba0">MCP TOOLS</text>

    <rect x="396" y="0" width="256" height="80" rx="8" fill="#16163a" stroke="#2a2a50" stroke-width="1"/>
    <text x="524" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="36" font-weight="800" fill="#34d399" filter="url(#glow)">865</text>
    <text x="524" y="64" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#8b8ba0">TESTS PASSING</text>

    <rect x="672" y="0" width="256" height="80" rx="8" fill="#16163a" stroke="#2a2a50" stroke-width="1"/>
    <text x="800" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="36" font-weight="800" fill="#60a5fa" filter="url(#glow)">7</text>
    <text x="800" y="64" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#8b8ba0">LANGUAGES</text>

    <rect x="948" y="0" width="256" height="80" rx="8" fill="#16163a" stroke="#2a2a50" stroke-width="1"/>
    <text x="1076" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="36" font-weight="800" fill="#fbbf24" filter="url(#glow)">-57%</text>
    <text x="1076" y="64" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#8b8ba0">CACHE SIZE</text>

    <rect x="1224" y="0" width="256" height="80" rx="8" fill="#16163a" stroke="#2a2a50" stroke-width="1"/>
    <text x="1352" y="40" text-anchor="middle" font-family="ui-monospace, monospace" font-size="17" fill="#e2e2f0"><tspan fill="#6b6b80">2.4k</tspan><tspan fill="#a855f7"> -> </tspan><tspan fill="#fff" font-weight="700">1k</tspan></text>
    <text x="1352" y="64" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#8b8ba0">SERVER.PY LINES</text>
  </g>

  <!-- Install -->
  <rect x="590" y="740" width="420" height="44" rx="10" fill="#1e1e3a" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="618" y="769" font-family="ui-monospace, monospace" font-size="19" fill="#a855f7">$</text>
  <text x="642" y="769" font-family="ui-monospace, monospace" font-size="19" fill="#e2e2f0">uvx token-savior</text>

  <!-- Footer -->
  <text x="800" y="822" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" fill="#6b6b80">Claude Code / Cursor / Windsurf / Cline / any MCP client</text>
  <text x="800" y="852" text-anchor="middle" font-family="ui-monospace, monospace" font-size="15" fill="#7c3aed">github.com/Mibayy/token-savior</text>

  <rect x="0" y="896" width="1600" height="4" fill="url(#accent)"/>
</svg>
